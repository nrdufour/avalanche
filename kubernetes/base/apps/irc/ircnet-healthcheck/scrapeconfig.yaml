---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: ircnet-healthcheck
  namespace: observability
spec:
  kubernetesSDConfigs:
    - role: Pod
      namespaces:
        names:
          - irc
      selectors:
        - role: Pod
          label: app=ircnet-healthcheck
  metricsPath: /metrics
  relabelings:
    - sourceLabels: [__meta_kubernetes_pod_container_name]
      action: keep
      regex: ircnet-healthcheck
    - sourceLabels: [__meta_kubernetes_pod_container_port_number]
      action: keep
      regex: "9090"
    - action: replace
      targetLabel: job
      replacement: ircnet-healthcheck
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
