apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ircnet-healthcheck
  name: ircnet-healthcheck
  namespace: irc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircnet-healthcheck
  template:
    metadata:
      labels:
        app: ircnet-healthcheck
    spec:
      containers:
        - name: ircnet-healthcheck
          image: forge.internal/nemo/ircnet-healthcheck:latest
          imagePullPolicy: Always
          args:
            - -config
            - /etc/ircnet-healthcheck/config.toml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/ircnet-healthcheck
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: ircnet-healthcheck-config
