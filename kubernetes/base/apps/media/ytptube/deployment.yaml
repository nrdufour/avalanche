---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytptube
  namespace: media
  labels:
    app: ytptube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ytptube
  template:
    metadata:
      labels:
        app: ytptube
    spec:
      nodeSelector:
        opi.feature.node.kubernetes.io/5plus: "true"
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1

      containers:
        # Main YTPTube container
        - name: ytptube
          image: ghcr.io/arabcoders/ytptube:latest
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Gluetun VPN to be ready..."
              until curl -sf http://localhost:9999 >/dev/null 2>&1; do
                echo "VPN not ready, waiting 5s..."
                sleep 5
              done
              echo "VPN is ready! Starting YTPTube..."
              exec /entrypoint.sh /opt/python/bin/python /app/app/main.py
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: ytdlp-config
              mountPath: /config/ytdlp.cli
              subPath: ytdlp.cli
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi

        # Gluetun VPN sidecar
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.40.1
          ports:
            - name: gluetun-http
              containerPort: 9999
              protocol: TCP
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: SERVER_COUNTRIES
              value: "France"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: LOG_LEVEL
              value: "info"
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "30s"
            - name: HEALTH_SUCCESS_WAIT_DURATION
              value: "10s"
            - name: HEALTH_SERVER_ADDRESS
              value: "0.0.0.0:9999"
            - name: DOT
              value: "off"
            - name: DNS_ADDRESS
              value: "1.1.1.1"
          envFrom:
            - secretRef:
                name: ytptube-vpn
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
            allowPrivilegeEscalation: true

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: ytptube-config
        - name: downloads
          nfs:
            server: cardinal.internal
            path: /tank/Media/goaround
        - name: ytdlp-config
          configMap:
            name: ytptube-config
        - name: tmp
          emptyDir: {}
