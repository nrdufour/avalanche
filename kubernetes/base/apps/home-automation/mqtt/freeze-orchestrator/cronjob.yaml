---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mqtt-freeze-orchestrator
  namespace: home-automation
  labels:
    app.kubernetes.io/name: mqtt-freeze-orchestrator
    freeze-orchestrator: mqtt
spec:
  schedule: "10 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    metadata:
      labels:
        freeze-orchestrator: mqtt
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 0
      template:
        metadata:
          labels:
            freeze-orchestrator: mqtt
        spec:
          serviceAccountName: mqtt-freeze-orchestrator
          restartPolicy: Never
          containers:
            - name: orchestrate
              image: bitnami/kubectl:1.32.3
              command: ["/scripts/orchestrate.sh"]
              env:
                - name: NAMESPACE
                  value: home-automation
                - name: APP
                  value: mqtt
                - name: POD_SELECTOR
                  value: app=mqtt
                - name: TARGET_CONTAINER
                  value: mqtt
                - name: FREEZE_MOUNTPATH
                  value: /mosquitto/data
                - name: FREEZER_NS
                  value: volume-freezer
                - name: FREEZER_SELECTOR
                  value: app=volume-freezer
                - name: POLL_TIMEOUT
                  value: "300"
                - name: MODE
                  value: main
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: scripts
              configMap:
                name: mqtt-freeze-scripts
                defaultMode: 0555
