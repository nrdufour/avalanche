---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mqtt-freeze-watchdog
  namespace: home-automation
  labels:
    app.kubernetes.io/name: mqtt-freeze-watchdog
spec:
  schedule: "*/5 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: mqtt-freeze-orchestrator
          restartPolicy: Never
          containers:
            - name: watchdog
              image: alpine:3.23
              command: ["sh", "-c"]
              args:
                - "apk add --no-cache kubectl >/dev/null 2>&1 && exec /scripts/watchdog.sh"
              env:
                - name: NAMESPACE
                  value: home-automation
                - name: PVC_NAME
                  value: mqtt
                - name: ORCH_JOB_LABEL
                  value: freeze-orchestrator=mqtt
                - name: APP
                  value: mqtt
                - name: POD_SELECTOR
                  value: app=mqtt
                - name: TARGET_CONTAINER
                  value: mqtt
                - name: FREEZE_MOUNTPATH
                  value: /mosquitto/data
                - name: FREEZER_NS
                  value: volume-freezer
                - name: FREEZER_SELECTOR
                  value: app=volume-freezer
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
          volumes:
            - name: scripts
              configMap:
                name: mqtt-freeze-scripts
                defaultMode: 0555
