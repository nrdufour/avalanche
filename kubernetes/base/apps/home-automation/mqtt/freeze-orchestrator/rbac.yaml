---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mqtt-freeze-orchestrator
  namespace: home-automation
---
# Namespace-local permissions. Cross-namespace exec into the volume-freezer
# DaemonSet is granted separately by the volume-freezer app's RoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mqtt-freeze-orchestrator
  namespace: home-automation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "patch"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources"]
    verbs: ["get", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mqtt-freeze-orchestrator
  namespace: home-automation
subjects:
  - kind: ServiceAccount
    name: mqtt-freeze-orchestrator
    namespace: home-automation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mqtt-freeze-orchestrator
