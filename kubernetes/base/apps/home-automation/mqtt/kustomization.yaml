---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - config.yaml
  - deployment.yaml
  - service.yaml
  # Note: PVC is managed by volsync-v2 component
components:
  - ../../../components/volsync-v2

# The freeze-orchestrator system (per-app cronjobs + use-copy-trigger annotation +
# manual ReplicationSource trigger override) was removed during the
# LINSTOR→Longhorn migration on 2026-04-29 — it was only needed for LINSTOR
# FS-consistent snapshots. Longhorn handles snapshot consistency natively.

patches:
  # !! DISASTER RECOVERY WARNING !!
  # This patch PREVENTS restore-from-backup on a fresh cluster.
  # If rebuilding the cluster, REMOVE this patch so the PVC is created
  # with dataSourceRef and VolSync restores data from S3 automatically.
  # Re-add it after the restore is complete.
  - target:
      kind: PersistentVolumeClaim
      name: .*
    patch: |
      - op: remove
        path: /spec/dataSourceRef
