---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - config.yaml
  - deployment.yaml
  - service.yaml
  - freeze-orchestrator/rbac.yaml
  - freeze-orchestrator/script-configmap.yaml
  - freeze-orchestrator/cronjob.yaml
  - freeze-orchestrator/watchdog-cronjob.yaml
  # Note: PVC is managed by volsync-v2 component
components:
  - ../../../components/volsync-v2
patches:
  # !! DISASTER RECOVERY WARNING !!
  # This patch PREVENTS restore-from-backup on a fresh cluster.
  # If rebuilding the cluster, REMOVE this patch so the PVC is created
  # with dataSourceRef and VolSync restores data from S3 automatically.
  # Re-add it after the restore is complete.
  - target:
      kind: PersistentVolumeClaim
      name: .*
    patch: |
      - op: remove
        path: /spec/dataSourceRef
  # Enable VolSync copy-trigger coordination on the source PVC.
  # The freeze-orchestrator CronJob drives the freeze/trigger/thaw flow.
  # Target by regex because at kustomize-build time the PVC name is
  # still the literal `${ARGOCD_ENV_APP}` placeholder (envsubst runs later).
  - target:
      kind: PersistentVolumeClaim
      name: .*
    patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: ${ARGOCD_ENV_APP}
        annotations:
          volsync.backube/use-copy-trigger: ""
  # Switch ReplicationSource from cron schedule to manual trigger.
  # The freeze-orchestrator CronJob owns the cadence now.
  - target:
      kind: ReplicationSource
      name: .*
    patch: |
      - op: remove
        path: /spec/trigger/schedule
      - op: add
        path: /spec/trigger/manual
        value: "bootstrap"
