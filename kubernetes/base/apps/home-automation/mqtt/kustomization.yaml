---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - config.yaml
  - deployment.yaml
  - service.yaml
  # Note: PVC is managed by volsync-v2 component
components:
  - ../../../components/volsync-v2

# NOTE: dataSourceRef-removal patch temporarily removed for the LINSTOR→Longhorn
# migration (2026-04-29) so the new PVC restores from the latest restic backup.
# Re-add after the new PVC binds and mqtt is verified healthy.
#
# The freeze-orchestrator system (per-app cronjobs + use-copy-trigger annotation +
# manual ReplicationSource trigger override) was removed in this commit — it was
# only needed for LINSTOR FS-consistent snapshots. Longhorn handles snapshot
# consistency natively, so the schedule-driven flow is back in effect.
