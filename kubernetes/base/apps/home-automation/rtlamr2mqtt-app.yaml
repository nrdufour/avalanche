apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rtlamr2mqtt
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://forge.internal/nemo/avalanche.git
    targetRevision: HEAD
    path: kubernetes/base/apps/home-automation/rtlamr2mqtt
  destination:
    namespace: home-automation
    name: 'in-cluster'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
