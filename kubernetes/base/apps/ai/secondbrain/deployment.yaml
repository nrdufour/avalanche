apiVersion: apps/v1
kind: Deployment
metadata:
  name: secondbrain
  namespace: ai
  labels:
    app.kubernetes.io/name: secondbrain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secondbrain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secondbrain
    spec:
      containers:
        - name: secondbrain
          image: forge.internal/nemo/secondbrain:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SB_DATABASE_HOST
              value: "secondbrain-16-db-rw.ai.svc.cluster.local"
            - name: SB_DATABASE_PORT
              value: "5432"
            - name: SB_DATABASE_NAME
              value: "secondbrain"
            - name: SB_DATABASE_SSLMODE
              value: "require"
            - name: SB_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: secondbrain-16-db-app
                  key: username
            - name: SB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secondbrain-16-db-app
                  key: password
            - name: SB_OLLAMA_URL
              value: "http://hawk.internal:11434"
            - name: SB_OLLAMA_CLASSIFY_MODEL
              value: "qwen3:4b"
            - name: SB_OLLAMA_TIMEOUT
              value: "120s"
            - name: SB_SERVER_BASE_URL
              value: "https://secondbrain.internal"
            - name: SB_OWNER
              value: "nicolas"
            - name: SB_AUTH_ENABLED
              value: "true"
            - name: SB_AUTH_ISSUER
              value: "https://auth.internal/oauth2/openid/secondbrain"
            - name: SB_AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: secondbrain-oidc
                  key: client-id
            - name: SB_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: secondbrain-oidc
                  key: client-secret
            - name: SB_AUTH_CA_CERT
              value: "/etc/ssl/custom/ca.crt"
            - name: SB_DIGEST_WEEKLY_CRON
              value: "0 10 * * 0"
            - name: SB_DIGEST_TIMEZONE
              value: "America/New_York"
            - name: SSL_CERT_FILE
              value: "/etc/ssl/custom/ca.crt"
            - name: SB_MATRIX_HOMESERVER
              value: "https://matrix.internal"
            - name: SB_MATRIX_ROOM_ID
              value: "!IYEdnXXPLynxcJxJhO:matrix.internal"
            - name: SB_MATRIX_AS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secondbrain-matrix
                  key: as_token
            - name: SB_MATRIX_USER_ID
              value: "@secondbrain-bot:matrix.internal"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: ca-cert
              mountPath: /etc/ssl/custom
              readOnly: true
      volumes:
        - name: ca-cert
          configMap:
            name: secondbrain-ca
