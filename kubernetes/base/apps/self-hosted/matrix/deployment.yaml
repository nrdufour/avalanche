---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse
  namespace: self-hosted
  labels:
    app.kubernetes.io/name: synapse
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
    spec:
      initContainers:
        - name: render-config
          image: ghcr.io/element-hq/synapse:v1.149.0
          command:
            - python3
            - -c
            - |
              import os
              with open("/config-template/homeserver.yaml") as f:
                  config = f.read()
              for key in ("SYNAPSE_DB_USER", "SYNAPSE_DB_PASSWORD", "SYNAPSE_OIDC_CLIENT_SECRET", "SYNAPSE_REGISTRATION_SECRET"):
                  config = config.replace("__" + key + "__", os.environ[key])
              with open("/data/homeserver.yaml", "w") as f:
                  f.write(config)
              # Render appservice registrations
              os.makedirs("/data/appservices", exist_ok=True)
              with open("/appservice-templates/secondbrain.yaml") as f:
                  appservice = f.read()
              for key in ("SECONDBRAIN_AS_TOKEN", "SECONDBRAIN_HS_TOKEN"):
                  appservice = appservice.replace("__" + key + "__", os.environ[key])
              with open("/data/appservices/secondbrain.yaml", "w") as f:
                  f.write(appservice)
          env:
            - name: SYNAPSE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: synapse-16-db-app
                  key: username
            - name: SYNAPSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: synapse-16-db-app
                  key: password
            - name: SYNAPSE_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: synapse-oidc
                  key: client-secret
            - name: SYNAPSE_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: REGISTRATION_SECRET
            - name: SECONDBRAIN_AS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: synapse-appservice-secondbrain
                  key: AS_TOKEN
            - name: SECONDBRAIN_HS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: synapse-appservice-secondbrain
                  key: HS_TOKEN
          volumeMounts:
            - name: homeserver-config
              mountPath: /config-template
              readOnly: true
            - name: appservice-secondbrain-template
              mountPath: /appservice-templates
              readOnly: true
            - name: rendered-config
              mountPath: /data
      containers:
        - name: synapse
          image: ghcr.io/element-hq/synapse:v1.149.0
          env:
            - name: UID
              value: "0"
            - name: GID
              value: "0"
            - name: SSL_CERT_FILE
              value: "/etc/ssl/custom/ca.crt"
          ports:
            - containerPort: 8008
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: rendered-config
              mountPath: /data/homeserver.yaml
              subPath: homeserver.yaml
            - name: log-config
              mountPath: /data/log.config
              subPath: log.config
            - name: ca-cert
              mountPath: /etc/ssl/custom
              readOnly: true
            - name: signing-key
              mountPath: /data/signing.key
              subPath: SIGNING_KEY
              readOnly: true
            - name: rendered-config
              mountPath: /data/appservices
              subPath: appservices
            - name: matrix
              mountPath: /data/media_store
      volumes:
        - name: homeserver-config
          configMap:
            name: synapse-homeserver
        - name: rendered-config
          emptyDir: {}
        - name: appservice-secondbrain-template
          configMap:
            name: synapse-appservice-secondbrain
        - name: log-config
          configMap:
            name: synapse-log-config
        - name: ca-cert
          configMap:
            name: synapse-ca
        - name: signing-key
          secret:
            secretName: synapse-secrets
        - name: matrix
          persistentVolumeClaim:
            claimName: matrix
