# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - element-web-deployment.yaml
  - service.yaml
  - element-web-service.yaml
  - ingress.yaml
  - element-web-ingress.yaml
  - homeserver-configmap.yaml
  - log-config-configmap.yaml
  - element-web-configmap.yaml
  - oidc-external-secret.yaml
  - secrets-external-secret.yaml
  - ca-configmap.yaml
  - db
  # Note: PVC is managed by volsync-v2 component
components:
  - ../../../components/volsync-v2
patches:
  # !! DISASTER RECOVERY WARNING !!
  # This patch PREVENTS restore-from-backup on a fresh cluster.
  # If rebuilding the cluster, REMOVE this patch so the PVC is created
  # with dataSourceRef and VolSync restores data from S3 automatically.
  # Re-add it after the restore is complete.
  - target:
      kind: PersistentVolumeClaim
      name: .*
    patch: |
      - op: remove
        path: /spec/dataSourceRef
