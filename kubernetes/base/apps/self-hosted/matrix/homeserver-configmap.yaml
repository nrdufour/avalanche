---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-homeserver
  namespace: self-hosted
data:
  homeserver.yaml: |
    server_name: "matrix.internal"
    public_baseurl: "https://matrix.internal"
    serve_server_wellknown: true

    listeners:
      - port: 8008
        type: http
        resources:
          - names: [client]

    database:
      name: psycopg2
      args:
        user: "%(SYNAPSE_DB_USER)s"
        password: "%(SYNAPSE_DB_PASSWORD)s"
        dbname: synapse
        host: synapse-16-db-rw.self-hosted.svc.cluster.local
        port: 5432
        cp_min: 5
        cp_max: 10

    media_store_path: "/data/media_store"
    max_upload_size: "50M"

    oidc_providers:
      - idp_id: kanidm
        idp_name: "Kanidm"
        discover: true
        issuer: "https://auth.internal/oauth2/openid/synapse"
        client_id: "synapse"
        client_secret: "%(SYNAPSE_OIDC_CLIENT_SECRET)s"
        scopes: ["openid", "profile", "email"]
        skip_verification: true
        user_mapping_provider:
          config:
            localpart_template: "{{ user.preferred_username }}"
            display_name_template: "{{ user.name }}"
            email_template: "{{ user.email }}"

    federation_domain_whitelist: []
    allow_public_rooms_over_federation: false

    use_presence: false
    enable_search: true
    url_preview_enabled: true

    enable_registration: false
    registration_shared_secret: "%(SYNAPSE_REGISTRATION_SECRET)s"

    report_stats: false

    signing_key_path: "/data/signing.key"
    log_config: "/data/log.config"
