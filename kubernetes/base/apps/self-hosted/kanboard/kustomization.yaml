# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - config.yaml
  - deployment.yaml
  - ingress.yaml
  - service.yaml
  # Note: PVC is managed by volsync-v2 component
components:
  - ../../../components/volsync-v2
# NOTE: the usual dataSourceRef strip patch is temporarily removed during the
# RWX→RWO migration (2026-04-13). The new RWO PVC must be created with
# dataSourceRef so VolSync restores data from S3. Re-add the patch after the
# migration is complete and verified.
