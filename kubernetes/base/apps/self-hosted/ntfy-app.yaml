---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://forge.internal/nemo/avalanche.git
    targetRevision: main
    path: kubernetes/base/apps/self-hosted/ntfy
    plugin:
      name: kustomize-envsubst
      env:
        - name: APP
          value: ntfy
        - name: VOLSYNC_CAPACITY
          value: "1Gi"
        - name: VOLSYNC_BITWARDEN_KEY
          value: "b45f65b2-6326-42b8-b159-0e630fd223db"
        - name: VOLSYNC_STORAGECLASS
          value: linstor
        - name: VOLSYNC_ACCESSMODE
          value: ReadWriteOnce
        - name: VOLSYNC_CACHE_CAPACITY
          value: "1Gi"
        - name: VOLSYNC_SCHEDULE
          # Staggered to avoid concurrent Longhorn snapshot clones (see volsync-v2 README)
          value: "20 * * * *"
        - name: VOLSYNC_UID
          value: "1000"
        - name: VOLSYNC_GID
          value: "1000"
        - name: VOLSYNC_SNAPSHOT_CLASS
          value: linstor-snapshot
        - name: VOLSYNC_CLEANUP_TEMP_PVC
          value: "true"
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      name: ntfy
      jsonPointers:
        - /spec/dataSourceRef
        - /spec/dataSource
  destination:
    server: https://kubernetes.default.svc
    namespace: self-hosted
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
