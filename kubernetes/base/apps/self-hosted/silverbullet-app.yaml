---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: silverbullet
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-trigger: "force-sync-2026-04-20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://forge.internal/nemo/avalanche.git
    targetRevision: main
    path: kubernetes/base/apps/self-hosted/silverbullet
    plugin:
      name: kustomize-envsubst
      env:
        - name: APP
          value: silverbullet
        - name: VOLSYNC_CAPACITY
          value: "2Gi"
        - name: VOLSYNC_BITWARDEN_KEY
          value: "b45f65b2-6326-42b8-b159-0e630fd223db"
        - name: VOLSYNC_STORAGECLASS
          value: longhorn
        - name: VOLSYNC_ACCESSMODE
          value: ReadWriteOnce
        - name: VOLSYNC_CACHE_CAPACITY
          value: "2Gi"
        - name: VOLSYNC_SCHEDULE
          value: "15 */6 * * *"
        - name: VOLSYNC_UID
          value: "1000"
        - name: VOLSYNC_GID
          value: "1000"
        - name: VOLSYNC_SNAPSHOT_CLASS
          value: longhorn-snapshot
        - name: VOLSYNC_CLEANUP_TEMP_PVC
          value: "true"
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      name: silverbullet
      jsonPointers:
        - /spec/dataSourceRef
        - /spec/dataSource
  destination:
    server: https://kubernetes.default.svc
    namespace: self-hosted
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
