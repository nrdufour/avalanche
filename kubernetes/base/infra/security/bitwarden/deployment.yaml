apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden-cli
  namespace: security
  labels:
    app.kubernetes.io/instance: bitwarden-cli
    app.kubernetes.io/name: bitwarden-cli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bitwarden-cli
      app.kubernetes.io/instance: bitwarden-cli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bitwarden-cli
        app.kubernetes.io/instance: bitwarden-cli
    spec:
      volumes:
        - name: private-ca
          configMap:
            name: private-ca
      containers:
        - name: bitwarden-cli
          image: forge.internal/nemo/bitwarden-cli@sha256:b212a6930092b01d36be0df07546a528eea19173ab556baf9d53740ac373f8a9
          imagePullPolicy: IfNotPresent
          env:
            # - name: NODE_TLS_REJECT_UNAUTHORIZED
            #   value: "0"
            - name: NODE_EXTRA_CA_CERTS
              value: /private-ca/root_ca.crt
            - name: BW_HOST
              valueFrom:
                secretKeyRef:
                  name: bitwarden-cli
                  key: BW_HOST
            - name: BW_USER
              valueFrom:
                secretKeyRef:
                  name: bitwarden-cli
                  key: BW_USERNAME
            - name: BW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bitwarden-cli
                  key: BW_PASSWORD
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
          volumeMounts:
            - name: private-ca
              mountPath: /private-ca
          livenessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 20
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 20
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 20
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
        - name: sync
          image: curlimages/curl:8.18.0
          command:
            - /bin/sh
            - -c
            - |
              sleep 30
              while true; do
                curl -s -XPOST http://127.0.0.1:8087/sync || true
                sleep 30
              done
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              memory: 32Mi