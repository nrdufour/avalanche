configuration:
  rebootSentinel: "/var/run/reboot-required"
  period: "10m"
  # Only for nix based node for now ...
  rebootCommand: "/run/current-system/sw/bin/reboot"
  # Handle PDB deadlocks: abort drain after 5min, then force reboot anyway
  drainTimeout: "5m"
  forceReboot: true

# DISABLED 2026-04-14: kured auto-rebooted opi03 at 03:38 today. The kernel
# upgrade itself was fine, but on satellite reconnect, udev failed to
# recreate /dev/linstor_vg/<pvc-uuid> symlinks for several LVs on opi02 and
# opi03. The LINSTOR satellites couldn't open the LVs for snapshot
# coordination -> "(opi0X) No response generated by handler" -> all VolSync
# backups stuck for hours. See docs/troubleshooting/linstor-vgmknodes-after-reboot.md
# (TODO: write that runbook).
#
# Until either (a) we move off LINSTOR or (b) we have a node-level health
# check that auto-runs `vgmknodes linstor_vg` after every reboot, kured is
# pinned to a non-existent node selector so its DaemonSet schedules on zero
# nodes. NixOS package upgrades still happen via system.autoUpgrade; only
# the automatic reboot is held.
#
# To re-enable: remove this nodeSelector block and let ArgoCD reconcile.
nodeSelector:
  kured-enabled: "true"
