configuration:
  rebootSentinel: "/var/run/reboot-required"
  period: "10m"
  # Only for nix based node for now ...
  rebootCommand: "/run/current-system/sw/bin/reboot"
  # Handle PDB deadlocks: abort drain after 5min, then force reboot anyway
  drainTimeout: "5m"
  forceReboot: true

# Re-enabled 2026-04-15 after the linstor-vgmknodes-fixup systemd unit + timer
# landed in the k3s NixOS module. Boot path runs vgmknodes before k3s starts;
# periodic timer (every 10min) catches late symlink drops triggered by the
# linstor-satellite container reactivating LVs post-boot. See
# docs/troubleshooting/linstor-vgmknodes-after-reboot.md for the full story.
