---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volume-freezer
  namespace: volume-freezer
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: volume-freezer
  namespace: volume-freezer
  labels:
    app: volume-freezer
spec:
  selector:
    matchLabels:
      app: volume-freezer
  template:
    metadata:
      labels:
        app: volume-freezer
    spec:
      serviceAccountName: volume-freezer
      # hostPID lets us see processes in all pods on this node so we can
      # nsenter into the target container's mount namespace.
      hostPID: true
      # Run on worker nodes only. K3s controllers don't host app workloads
      # that need freezing (piraeus satellites are only on workers per the
      # existing cluster layout). Tolerate common taints.
      tolerations:
        - operator: Exists
      containers:
        - name: freezer
          image: alpine:3.19
          # Install util-linux (fsfreeze, nsenter) once at startup; then idle.
          command:
            - sh
            - -c
            - "apk add --no-cache util-linux >/dev/null 2>&1 && exec sleep infinity"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: helper
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: helper
          configMap:
            name: volume-freezer-helper
            defaultMode: 0555
