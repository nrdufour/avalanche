---
apiVersion: v1
kind: ConfigMap
metadata:
  name: volume-freezer-helper
  namespace: volume-freezer
data:
  freeze.sh: |
    #!/bin/sh
    # Runs inside the volume-freezer DaemonSet pod on a node.
    # Enters the mount namespace of a target container and runs fsfreeze.
    #
    # Usage:  freeze.sh <op> <container-id> <mount-path>
    #   op         = freeze | thaw
    #   container-id = CRI container ID (without containerd:// or docker:// prefix)
    #   mount-path = absolute path inside the target container to freeze
    #
    # Resolves target PID by scanning /proc/*/cgroup for the container ID.
    # Requires hostPID + privileged to see and enter the target's mount ns.
    set -eu

    op="${1:?op required}"
    cid_full="${2:?container id required}"
    mountpath="${3:?mount path required}"

    # Strip cri:// prefix if caller left it in; keep just the hex id.
    cid="${cid_full##*://}"
    # Some runtimes produce very long IDs; match a reasonable prefix.
    cid_short="$(echo "$cid" | cut -c1-32)"

    case "$op" in
      freeze) flag="-f" ;;
      thaw)   flag="-u" ;;
      *) echo "ERR: unknown op '$op' (expected freeze|thaw)" >&2; exit 2 ;;
    esac

    # Locate a PID belonging to the target container.
    # cgroup lines contain the container id (containerd and cri-o patterns).
    target_pid=""
    for pid_dir in /proc/[0-9]*; do
      pid="${pid_dir##*/}"
      if [ -r "$pid_dir/cgroup" ] && grep -q "$cid_short" "$pid_dir/cgroup" 2>/dev/null; then
        target_pid="$pid"
        break
      fi
    done

    if [ -z "$target_pid" ]; then
      echo "ERR: no PID found for container $cid_short on this node" >&2
      exit 3
    fi

    echo "INFO: target pid=$target_pid container=$cid_short op=$op path=$mountpath" >&2

    # Enter the target's mount namespace, then run fsfreeze from there.
    # The target's view of $mountpath is what gets frozen (superblock-level).
    nsenter -t "$target_pid" -m -- fsfreeze "$flag" "$mountpath"
    echo "OK: $op done"
