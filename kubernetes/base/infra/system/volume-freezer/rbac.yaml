---
# Permissions a freeze-orchestrator needs to USE the volume-freezer DaemonSet.
# ClusterRole so it can be reused by any opt-in app; scoped by RoleBinding to
# the volume-freezer namespace so holders only get these verbs on freezer pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: volume-freezer-client
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# Grant the ClusterRole to authorized ServiceAccounts.
# Add one subject per opt-in app as the pattern rolls out.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: volume-freezer-clients
  namespace: volume-freezer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: volume-freezer-client
subjects:
  - kind: ServiceAccount
    name: mqtt-freeze-orchestrator
    namespace: home-automation
