apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volume-freezer
  namespace: argocd
spec:
  project: default
  source:
    path: kubernetes/base/infra/system/volume-freezer
    repoURL: https://forge.internal/nemo/avalanche.git
    targetRevision: HEAD
  destination:
    namespace: volume-freezer
    name: 'in-cluster'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
