---
apiVersion: v1
kind: ConfigMap
metadata:
  name: linstor-dashboard
  namespace: home-automation
  labels:
    grafana_dashboard: "1"
data:
  linstor.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "title": "Overview",
          "type": "row",
          "id": 100
        },
        {
          "title": "Nodes Online",
          "type": "stat",
          "id": 1,
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "count(linstor_node_state == 2)",
              "legendFormat": "Online",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Volumes",
          "type": "stat",
          "id": 2,
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "text", "value": null }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "linstor_resource_definition_count",
              "legendFormat": "Volumes",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Total Storage Used",
          "type": "stat",
          "id": 3,
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "1 - (sum(linstor_storage_pool_capacity_free_bytes{storage_pool=\"ssd-thin\"}) / sum(linstor_storage_pool_capacity_total_bytes{storage_pool=\"ssd-thin\"}))",
              "legendFormat": "Used",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Error Reports",
          "type": "stat",
          "id": 4,
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(linstor_error_reports_count{hostname!=\"\"})",
              "legendFormat": "Errors",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Degraded Volumes",
          "type": "stat",
          "id": 5,
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "count(linstor_volume_state != 1 and linstor_volume_state != 4) or vector(0)",
              "legendFormat": "Degraded",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pool Errors",
          "type": "stat",
          "id": 6,
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "targets": [
            {
              "expr": "sum(linstor_storage_pool_error_count{storage_pool=\"ssd-thin\"}) or vector(0)",
              "legendFormat": "Pool Errors",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "title": "Storage Pools",
          "type": "row",
          "id": 101
        },
        {
          "title": "Pool Usage per Node",
          "type": "gauge",
          "id": 7,
          "gridPos": { "h": 8, "w": 10, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "vertical",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "1 - (linstor_storage_pool_capacity_free_bytes{storage_pool=\"ssd-thin\"} / linstor_storage_pool_capacity_total_bytes{storage_pool=\"ssd-thin\"})",
              "legendFormat": "{{node}}",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pool Free Space Trend",
          "type": "timeseries",
          "id": 8,
          "gridPos": { "h": 8, "w": 14, "x": 10, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "drawStyle": "line",
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "linstor_storage_pool_capacity_free_bytes{storage_pool=\"ssd-thin\"}",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "title": "Volumes",
          "type": "row",
          "id": 102
        },
        {
          "title": "Volume Overview",
          "type": "table",
          "id": 9,
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "text", "value": null } ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Provisioned" },
                "properties": [ { "id": "unit", "value": "bytes" } ]
              },
              {
                "matcher": { "id": "byName", "options": "Allocated" },
                "properties": [ { "id": "unit", "value": "bytes" } ]
              },
              {
                "matcher": { "id": "byName", "options": "Resource" },
                "properties": [
                  { "id": "custom.width", "value": 300 }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [ { "displayName": "Resource", "desc": false } ]
          },
          "targets": [
            {
              "expr": "max by (resource) (label_replace(linstor_volume_definition_size_bytes{volume_number=\"0\"}, \"resource\", \"$1\", \"name\", \"(.*)\"))",
              "legendFormat": "{{resource}}",
              "format": "table",
              "instant": true,
              "refId": "provisioned"
            },
            {
              "expr": "max by (resource) (linstor_volume_allocated_size_bytes{volume_number=\"0\"})",
              "legendFormat": "{{resource}}",
              "format": "table",
              "instant": true,
              "refId": "allocated"
            },
            {
              "expr": "count by (resource) (linstor_volume_state{volume_number=\"0\"} == 1)",
              "legendFormat": "{{resource}}",
              "format": "table",
              "instant": true,
              "refId": "replicas"
            },
            {
              "expr": "count by (resource) (linstor_volume_state{volume_number=\"0\"} == 4)",
              "legendFormat": "{{resource}}",
              "format": "table",
              "instant": true,
              "refId": "diskless"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "volume_number": true
                },
                "renameByName": {
                  "resource": "Resource",
                  "Value #provisioned": "Provisioned",
                  "Value #allocated": "Allocated",
                  "Value #replicas": "UpToDate Replicas",
                  "Value #diskless": "Diskless Clients"
                },
                "indexByName": {
                  "Resource": 0,
                  "Provisioned": 1,
                  "Allocated": 2,
                  "UpToDate Replicas": 3,
                  "Diskless Clients": 4
                }
              }
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "title": "Health",
          "type": "row",
          "id": 103
        },
        {
          "title": "Degraded Volume Details",
          "type": "table",
          "id": 10,
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "text", "value": null } ]
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "UpToDate", "color": "green", "index": 0 },
                    "4": { "text": "Diskless", "color": "blue", "index": 1 },
                    "5": { "text": "Inconsistent", "color": "yellow", "index": 2 },
                    "6": { "text": "Failed", "color": "red", "index": 3 }
                  }
                }
              ]
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "State" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "options": { "showHeader": true },
          "targets": [
            {
              "expr": "linstor_volume_state != 1 and linstor_volume_state != 4",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "volume_number": true
                },
                "renameByName": {
                  "node": "Node",
                  "resource": "Resource",
                  "Value": "State"
                }
              }
            }
          ]
        },
        {
          "title": "New Error Reports (per hour)",
          "type": "timeseries",
          "id": 11,
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "fillOpacity": 0,
                "lineWidth": 2,
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "increase(linstor_error_reports_count{hostname!=\"\"}[1h])",
              "legendFormat": "{{hostname}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["linstor", "storage", "drbd"],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "selected": false, "text": "default", "value": "default" }
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "title": "LINSTOR Storage",
      "uid": "linstor-storage"
    }
