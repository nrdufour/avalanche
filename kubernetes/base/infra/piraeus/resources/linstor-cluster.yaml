apiVersion: piraeus.io/v1
kind: LinstorCluster
metadata:
  name: linstorcluster
spec:
  patches:
    # Skip DRBD kernel module compilation — NixOS pre-loads DRBD via boot.kernelModules
    - target:
        kind: Pod
      patch: |
        apiVersion: v1
        kind: Pod
        metadata:
          name: satellite
        spec:
          initContainers:
            - name: drbd-module-loader
              image: quay.io/piraeusdatastore/drbd9-none:v9.3.1
          containers:
            - name: linstor-satellite
              env:
                - name: PATH
                  value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/run/wrappers/bin:/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin
