# Piraeus Operator v2 Helm Values
# Cluster configuration is managed via CRDs (LinstorCluster, LinstorSatelliteConfiguration)
# in resources/, not here. This file is for operator-level settings only.

installCRDs: true

# Enable kube-rbac-proxy sidecar so operator metrics are exposed on :8443.
# Without this, the manager starts with --metrics-bind-address=0 (disabled)
# and the chart-provisioned metrics Service has no backend, causing the
# ServiceMonitor in resources/monitoring.yaml to TargetDown.
kubeRbacProxy:
  enabled: true
