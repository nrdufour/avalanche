apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: piraeus-operator-tls
      namespace: piraeus-system
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: piraeus-operator-validating-webhook-configuration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
  sources:
    - path: kubernetes/base/infra/piraeus/resources
      repoURL: https://forge.internal/nemo/avalanche.git
      targetRevision: HEAD
      ref: values
    - path: .
      repoURL: oci://ghcr.io/piraeusdatastore/piraeus-operator/piraeus
      targetRevision: 2.10.5
      helm:
        releaseName: piraeus-operator
        valueFiles:
          - $values/kubernetes/base/infra/piraeus/piraeus/helm-values.yaml
  destination:
    namespace: piraeus-system
    name: 'in-cluster'
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
