crds:
  enabled: true
  upgradeJob:
    enabled: true
    forceConflicts: true
    image:
      kubectl:
        tag: v1.34.3
cleanPrometheusOperatorObjectNames: true

alertmanager:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: Prefix
    hosts: ["alertmanager.internal"]
  alertmanagerSpec:
    # Single replica — this is a homelab, not a HA pager. The notification
    # path survives a cluster outage via the alertmanager-ntfy relay on
    # hawk, which is the real "outside" monitor point for cluster incidents.
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: linstor
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      # Placeholder null receiver — this route is replaced in a later step
      # once the alertmanager-ntfy relay on hawk is up.
      receiver: "null"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: "null"

kubeApiServer:
  enabled: true
  endpoints:
    - 10.1.0.20
    - 10.1.0.21
    - 10.1.0.22
  serviceMonitor:
    metricRelabelings:
      # Drop high cardinality labels
      - action: drop
        sourceLabels:
          - "__name__"
        regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
      - action: drop
        sourceLabels:
          - "__name__"
        regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: true
  endpoints:
    - 10.1.0.20
    - 10.1.0.21
    - 10.1.0.22

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    metricRelabelings:
      # Drop high cardinality labels
      - action: labeldrop
        regex: (uid)
      - action: labeldrop
        regex: (id|name)
      - action: drop
        sourceLabels:
          - "__name__"
        regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: Prefix
    hosts: ["prometheus.internal"]
  prometheusSpec:
    # replicas: 3
    # replicaExternalLabelName: __replica__
    nodeSelector:
      opi.feature.node.kubernetes.io/5plus: "true"

    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    scrapeInterval: 1m # Must match interval in Grafana Helm chart

    enableAdminAPI: true
    walCompression: true
    enableFeatures:
      - memory-snapshot-on-shutdown
    retention: 7d
    retentionSize: 30GB
    externalLabels:
      cluster: main
    resources:
      requests:
        cpu: 100m
      limits:
        cpu: 4
        memory: 4000Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          # storageClassName: openebs-hostpath
          storageClassName: longhorn
          resources:
            requests:
              storage: 30Gi

nodeExporter:
  enabled: true

prometheus-node-exporter:
  fullnameOverride: node-exporter
  extraArgs:
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs|tmpfs|efivarfs|ramfs|nfs|nfs4)$
    - --collector.netdev.device-exclude=^(veth|cni|docker|br-)
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node

kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node

grafana:
  enabled: false
  forceDeployDashboards: true
